skip_lfs: true
output:
  - success
  - failure

pre-commit:
  jobs:
    - name: fmt
      stage_fixed: true
      run: just fmt
pre-push:
  parallel: true
  jobs:
    - name: lint
      run: just lint

    - name: test
      run: just test

# Eat our own dogfood
prepare-commit-msg:
  commands:
    aittributor:
      run: aittributor {1}
